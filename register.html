<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SyncRide</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container flex-between">
            <div class="logo text-gradient"><a href="index.html" style="display:flex; align-items:center; gap:10px;"><img src="images/logo.png" alt="SyncRide Logo" style="height:40px; border-radius:8px;"> SyncRide</a></div>
            <ul class="nav-links">
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container flex-center animate-fade-in" style="min-height: 80vh; padding: 2rem 0;">
        <div class="glass-panel" style="width: 100%; max-width: 500px;">
            <h2 class="text-center" style="margin-bottom: 2rem;"><i class="fas fa-user-plus"></i> Create an Account</h2>
            <form id="registerForm">
                <div id="registerError" class="text-secondary" style="color: var(--danger); margin-bottom: 1rem; text-align:center; display:none;"></div>
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" class="form-control" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-user-check"></i> Register</button>
            </form>
            <p class="text-center text-secondary" style="margin-top: 1.5rem;">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </main>

    <script src="scripts/api.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
