<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SyncRide</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/layout.css">
</head>
<body>
    <nav class="navbar">
        <div class="container flex-between">
            <div class="logo text-gradient"><a href="index.html" style="display:flex; align-items:center; gap:10px;"><img src="images/logo.png" alt="SyncRide Logo" style="height:40px; border-radius:8px;"> SyncRide</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="safety.html">Safety</a></li>
                <li><a href="login.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container flex-center animate-fade-in" style="min-height: 80vh; padding: 4rem 0;">
        <div class="glass-panel" style="width: 100%; max-width: 600px;">
            <h2 class="text-center" style="margin-bottom: 2rem;">Contact Our Support Team</h2>
            <p class="text-center text-secondary" style="margin-bottom: 2rem;">Have a question or facing an issue? Send us a message and we'll get back to you within 24 hours.</p>
            
            <form id="contactForm" onsubmit="event.preventDefault(); alert('Message sent successfully!'); this.reset();">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" class="form-control" required>
                        <option value="support">Technical Support</option>
                        <option value="billing">Billing Inquiry</option>
                        <option value="feedback">General Feedback</option>
                        <option value="report">Report a Driver/User</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </main>
</body>
</html>
